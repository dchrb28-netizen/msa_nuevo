name: myapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  simple_animations: ^5.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  percent_indicator: ^4.2.3
  image_picker: ^1.1.2
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flex_color_picker: ^3.5.1
  flutter_colorpicker: ^1.1.0
  flutter_staggered_animations: ^1.1.1
  fl_chart: ^0.68.0
  rive: ^0.13.4
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  json_annotation: ^4.9.0
  syncfusion_flutter_gauges: ^26.1.39
  path: ^1.9.0
  smooth_page_indicator: ^1.1.0
  freezed_annotation: ^2.4.1
  table_calendar: ^3.1.2
  http: ^1.2.1
  flutter_html: ^3.0.0-beta.2
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  timeline_tile: ^2.0.0
  flutter_native_splash: ^2.4.0
  permission_handler: ^11.3.1
  firebase_core: ^3.1.1
  firebase_ai: ^0.1.0
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

dependency_overrides:
  intl: 0.20.2

flutter:
  uses-material-design: true

  assets:
    - assets/acuario/
    - assets/luna_png/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon" # Can be true or a path to the icon image
  ios: true
  image_path: "assets/icons/icon.png"
  web: 
    generate: true
    image_path: "assets/icons/icon.png"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
  macos:
    generate: true
    image_path: "assets/icons/icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image: assets/luna_png/luna_splash_w.png
  image_dark: assets/luna_png/luna_splash_b.png

  android_12:
    color: "#FFFFFF"
    color_dark: "#000000"
    image: assets/luna_png/luna_splash_w.png
    image_dark: assets/luna_png/luna_splash_b.png
